name: CI

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      # build-and-test already ran lint + tests + build; skip lifecycle scripts (prepublishOnly)
      - run: npm publish --dry-run --ignore-scripts

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: NPM_TOKEN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - name: Bump patch if version exists on npm, then publish
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          LATEST=$(npm view "$PKG" version 2>/dev/null || true)
          echo "Registry latest: ${LATEST:-<none>}"
          echo "Local package.json: $LOCAL"

          while npm view "$PKG@$LOCAL" version >/dev/null 2>&1; do
            echo "Version $LOCAL is already published; bumping patch..."
            npm version patch --no-git-tag-version
            LOCAL=$(node -p "require('./package.json').version")
          done

          echo "Publishing $PKG@$LOCAL ..."
          npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}